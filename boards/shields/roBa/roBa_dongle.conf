# Dongle configuration (BLE Receiver) - nice!nano with OLED Display
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_STUDIO=n

# Split keyboard support as BLE receiver
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# UF2形式での出力
CONFIG_BUILD_OUTPUT_UF2=y

# OLED Display (128x64 SSD1306)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Display オプション
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y      # ドングルのバッテリー表示
CONFIG_ZMK_DONGLE_DISPLAY_WPM=n                 # WPM メーター（不要ならn）
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=y           # ボンゴキャット表示
CONFIG_ZMK_DONGLE_DISPLAY_MODIFIERS=y           # 修飾キー表示
CONFIG_ZMK_DONGLE_DISPLAY_LAYER=y               # レイヤー表示
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=n       # Mac 修飾子シンボル（必要ならy）
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="left"
