# Dongle configuration (BLE Receiver) - RAYTAC MDBT50Q-RX
# Using raytac_mdbt50q_db_40_nrf52840 board definition

CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Studio - dongleでは無効化
CONFIG_ZMK_STUDIO=n

# Split keyboard support as BLE receiver
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Adafruit bootloader対応
CONFIG_USB_DEVICE_STACK=y

# ドングルは指示入力（kscan）が不要（R側から受け取る）
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
